<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Watchlist</title>
    <link href="style.css" rel="stylesheet"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Smythe&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" id="container">
        <nav id="nav" class="nav">
            <section class="nav-el" id="nav-el">
                <h1 id="title">Find your film</h1>
                <button id="watchList">My Watchlist</button>
            </section>
        </nav>
        <section class="search-container">
            <input type="text" id="movie" placeholder="Type something"/>
            <button id="search">Search</button>
        </section>
        <div class="movies-container" id="movies-container">
            <img src="./images/Icon.png">
            <p>Start exploring</p>
        </div>
    </div>
    
    <script src="index.js" type="module"></script>
</body>
</html>
